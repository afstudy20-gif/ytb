name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    name: Android (signed APK + AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: wt-1-tauri-shell/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125" "platforms;android-34" "build-tools;34.0.0"

      - name: Decode keystore
        run: |
          mkdir -p ${{ github.workspace }}/.keys
          echo "${{ secrets.ANDROID_KEY_BASE64 }}" | base64 -d > ${{ github.workspace }}/.keys/release.keystore

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wt-1-tauri-shell/src-tauri/target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('wt-1-tauri-shell/src-tauri/Cargo.lock') }}

      - name: Install frontend
        working-directory: wt-1-tauri-shell
        run: pnpm install --frozen-lockfile

      - name: Init Android project
        working-directory: wt-1-tauri-shell
        run: pnpm tauri android init

      - name: Apply Android overlay (PlaybackService + media3 deps)
        run: |
          overlay=wt-1-tauri-shell/src-tauri/android-overlay/app
          gen=wt-1-tauri-shell/src-tauri/gen/android/app
          # Locate the package source dir Tauri generated (kotlin/ in older
          # templates, java/ in 2.11+). Mirror our Kotlin files into whichever
          # layout exists.
          src_root=$(find "$gen/src/main" -maxdepth 2 -type d -name "com" -print -quit)
          pkg_dir=$(find "$src_root/com/afstudy20/ytb" -type d 2>/dev/null | head -1)
          if [ -z "$pkg_dir" ]; then
            pkg_dir="$src_root/com/afstudy20/ytb"
            mkdir -p "$pkg_dir"
          fi
          echo "Restoring custom Kotlin into $pkg_dir"
          cp "$overlay/src/main/kotlin/com/afstudy20/ytb/PlaybackService.kt" "$pkg_dir/PlaybackService.kt"
          cp "$overlay/src/main/kotlin/com/afstudy20/ytb/PlaybackPlugin.kt" "$pkg_dir/PlaybackPlugin.kt"
          # build.gradle.kts with media3/kotlinx deps + abi flavors overrides the generated one
          cp "$overlay/build.gradle.kts" "$gen/build.gradle.kts"
          # Inject PlaybackService + permissions into the GENERATED manifest
          # (kept intact so the activity + theme stay in sync with styles.xml).
          manifest="$gen/src/main/AndroidManifest.xml"
          # Insert permissions right after the opening <manifest> tag.
          perms=$(grep 'uses-permission' "$overlay/src/main/AndroidManifest.xml")
          awk -v perms="$perms" '/<manifest/{print; print perms; next}1' "$manifest" > "$manifest.tmp" && mv "$manifest.tmp" "$manifest"
          # Insert the <service> block right before </application>.
          service_block=$(sed -n '/<service name=".PlaybackService"/,/<\/service>/p' "$overlay/src/main/AndroidManifest.xml" | sed 's/^ *//')
          awk -v svc="$service_block" '/<\/application>/{print svc}1' "$manifest" > "$manifest.tmp" && mv "$manifest.tmp" "$manifest"
          echo "=== patched manifest ==="; cat "$manifest"

      - name: Build Android (release)
        working-directory: wt-1-tauri-shell
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
          TAURI_ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/.keys/release.keystore
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
        run: |
          pnpm tauri android build --apk --aab

      - name: Collect artifacts
        run: |
          mkdir -p out
          find wt-1-tauri-shell/src-tauri/gen/android -type f \( -name '*.apk' -o -name '*.aab' \) -exec cp {} out/ \;
          ls -la out/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: out/*

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true

  desktop:
    name: Desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: dmg
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: AppImage
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: msi
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: wt-1-tauri-shell/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend
        working-directory: wt-1-tauri-shell
        run: pnpm install --frozen-lockfile

      - name: Build desktop
        working-directory: wt-1-tauri-shell
        run: pnpm tauri build

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p out
          find wt-1-tauri-shell/src-tauri/target/release/bundle -type f \( -name '*.dmg' -o -name '*.AppImage' -o -name '*.msi' -o -name '*.deb' \) -exec cp {} out/ \; || true
          ls -la out/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: out/*
          if-no-files-found: warn

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
          fail_on_unmatched_files: false
