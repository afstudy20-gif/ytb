name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    name: Android (signed APK + AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: wt-1-tauri-shell/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK / platform / build-tools
        run: |
          sdkmanager "ndk;26.1.10909125" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Decode keystore
        run: |
          mkdir -p "${{ github.workspace }}/.keys"
          # Use printf (no trailing newline) and pipe through base64 -d;
          # -w0 avoids line wrapping issues when re-encoding is ever needed.
          printf '%s' "${{ secrets.ANDROID_KEY_BASE64 }}" | base64 -d > "${{ github.workspace }}/.keys/release.keystore"
          # Sanity check: keystore must be non-empty and start with the JKS/PKCS12 magic.
          test -s "${{ github.workspace }}/.keys/release.keystore"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wt-1-tauri-shell/src-tauri/target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('wt-1-tauri-shell/src-tauri/Cargo.lock') }}

      - name: Install shell frontend
        working-directory: wt-1-tauri-shell
        run: pnpm install --frozen-lockfile

      - name: Install UI frontend
        working-directory: wt-2-ui
        run: pnpm install --frozen-lockfile

      - name: Init Android project
        working-directory: wt-1-tauri-shell
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: pnpm tauri android init --ci

      - name: Apply Android overlay (PlaybackService + media3 deps)
        run: |
          overlay=wt-1-tauri-shell/src-tauri/android-overlay/app
          gen=wt-1-tauri-shell/src-tauri/gen/android/app

          # Mirror custom Kotlin sources into the generated package directory.
          # Tauri places MainActivity.kt under src/main/<kotlin|java>/com/afstudy20/ytb/.
          com_dir=$(find "$gen/src/main" -maxdepth 2 -type d -name "com" -print -quit)
          if [ -z "$com_dir" ]; then
            echo "ERROR: could not find generated com/ directory" >&2
            exit 1
          fi
          src_root=$(dirname "$com_dir")
          pkg_dir="$src_root/com/afstudy20/ytb"
          mkdir -p "$pkg_dir"
          cp "$overlay/src/main/kotlin/com/afstudy20/ytb/PlaybackService.kt" "$pkg_dir/PlaybackService.kt"
          cp "$overlay/src/main/kotlin/com/afstudy20/ytb/PlaybackPlugin.kt" "$pkg_dir/PlaybackPlugin.kt"
          cp "$overlay/src/main/kotlin/com/afstudy20/ytb/VideoPlayerHelper.kt" "$pkg_dir/VideoPlayerHelper.kt"
          echo "Overlay Kotlin files copied to $pkg_dir"

          # Replace generated build.gradle.kts with ours (includes signing config + abi flavors).
          cp "$overlay/build.gradle.kts" "$gen/build.gradle.kts"

          # Patch the generated manifest: keep Tauri's activity/theme/resources and
          # inject our media permissions + PlaybackService.
          manifest="$gen/src/main/AndroidManifest.xml"

          # Inject foreground/media permissions right after the opening <manifest> tag to avoid format issues.
          perl -i -0pe 's|(<manifest\b[^>]*>)|$1\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />|s' "$manifest"

          # Inject PlaybackService before </application>.
          perl -i -0pe 's|</application>|\n        <service\n            android:name=".PlaybackService"\n            android:exported="false"\n            android:foregroundServiceType="mediaPlayback">\n            <intent-filter>\n                <action android:name="androidx.media3.session.MediaSessionService" />\n            </intent-filter>\n        </service>\n    </application>|s' "$manifest"

          # Write signing credentials for the release signing config.
          # NOTE: PKCS12 keystores fail with "final block not properly padded" when
          # the key (alias) password differs from the store password. keytool -list
          # confirmed the store password works, so use it for the key password too
          # unless a dedicated key password secret is provided.
          {
            echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}"
            echo "storePassword=${{ secrets.ANDROID_KEY_PASSWORD }}"
            echo "storeFile=${{ github.workspace }}/.keys/release.keystore"
          } > wt-1-tauri-shell/src-tauri/gen/android/keystore.properties

      - name: Build Android (release)
        working-directory: wt-1-tauri-shell
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: |
          pnpm tauri android build --ci --apk --aab --target aarch64 --target armv7 --target i686 --target x86_64

      - name: Collect artifacts
        run: |
          mkdir -p out
          find wt-1-tauri-shell/src-tauri/gen/android -type f \( -name '*.apk' -o -name '*.aab' \) -exec cp {} out/ \;
          ls -la out/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: out/*

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
