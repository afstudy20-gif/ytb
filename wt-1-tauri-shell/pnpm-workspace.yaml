allowBuilds:
  esbuild: true

onlyBuiltDependencies:
  - esbuild

settings:
  minimumReleaseAge: 0
  minimumReleaseAgeStrict: false
  trustPolicy: off
  verifyDepsBeforeRun: false
  supportedArchitectures:
    os:
      - darwin
      - linux
      - win32
    cpu:
      - arm64
      - x64
    libc:
      - current
